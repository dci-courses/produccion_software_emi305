name: CI

on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked

      - name: Validate Python scripts
        run: python -m compileall scripts

      - name: Validate notebooks and result JSON
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path

          paths = [
              *Path("nbs").rglob("*.ipynb"),
              *Path("data/results").glob("*.json"),
              *Path("data/results").glob("*.sarif"),
              Path("data/repos.json"),
          ]
          for path in paths:
              json.loads(path.read_text(encoding="utf-8"))
              print(f"OK {path}")
          PY

      - name: Validate repository sync dry-run
        run: uv run python scripts/add_submodules.py --dry-run

      - name: Validate security script dry-runs
        run: |
          uv run python scripts/generate_sboms.py --dry-run
          uv run python scripts/generate_codeql.py --dry-run
          uv run python scripts/generate_grype.py --dry-run

      - name: Render Quarto site
        working-directory: nbs
        run: uv run quarto render
